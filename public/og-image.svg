<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Icon gradient -->
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#4f46e5"/>
      <stop offset="50%"  stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <!-- Background glow blobs -->
    <radialGradient id="blob1" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#4f46e5" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob3" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#0891b2" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0"/>
    </radialGradient>
    <!-- Text gradient for "Zapia" wordmark -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#a5b4fc"/>
      <stop offset="50%"  stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#020617"/>

  <!-- Decorative glow blobs -->
  <ellipse cx="200"  cy="200"  rx="380" ry="300" fill="url(#blob1)"/>
  <ellipse cx="1050" cy="450"  rx="300" ry="280" fill="url(#blob2)"/>
  <ellipse cx="900"  cy="100"  rx="250" ry="200" fill="url(#blob3)"/>

  <!-- Subtle grid lines -->
  <g stroke="#1e293b" stroke-width="1" opacity="0.5">
    <line x1="0"    y1="210" x2="1200" y2="210"/>
    <line x1="0"    y1="420" x2="1200" y2="420"/>
    <line x1="400"  y1="0"   x2="400"  y2="630"/>
    <line x1="800"  y1="0"   x2="800"  y2="630"/>
  </g>

  <!-- Icon container (rounded rect + lightning bolt), centred vertically, left-ish -->
  <g transform="translate(480, 130)">
    <!-- Icon background rounded rect -->
    <rect width="240" height="240" rx="48" fill="url(#iconGrad)"/>
    <!-- Lightning bolt scaled up from 32×32 viewBox to 240×240 -->
    <!-- Original path: M18.5 4L8 17h8.5l-1 11L26 15h-8.5l1-11z in 32×32 -->
    <!-- Scale factor: 240/32 = 7.5 -->
    <path
      transform="scale(7.5)"
      d="M18.5 4L8 17h8.5l-1 11L26 15h-8.5l1-11z"
      fill="white"
    />
  </g>

  <!-- "Zapia" wordmark -->
  <text
    x="600"
    y="500"
    font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="96"
    font-weight="800"
    text-anchor="middle"
    fill="#ffffff"
  >Zapia</text>

  <!-- Tagline -->
  <text
    x="600"
    y="558"
    font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="26"
    font-weight="400"
    text-anchor="middle"
    fill="#94a3b8"
  >L&#x2019;h&#xe9;bergement qui ne vous ralentit jamais</text>

  <!-- Bottom badge strip -->
  <rect x="460" y="588" width="280" height="36" rx="18" fill="#1e293b"/>
  <text
    x="600"
    y="612"
    font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="16"
    font-weight="500"
    text-anchor="middle"
    fill="#6366f1"
  >zapia.fr</text>
</svg>
